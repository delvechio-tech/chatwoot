name: Build & Deploy delvechiotech/chatwoot

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. 1.0.1)'
        required: true
        type: string

env:
  DOCKER_REPO: delvechiotech/chatwoot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: set-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME#v}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building image: ${{ env.DOCKER_REPO }}:${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKER_REPO }}:${{ steps.set-tag.outputs.tag }}
            ${{ env.DOCKER_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-portainer:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Update chatwoot-enterprise stack on Portainer
        run: |
          TAG="${{ needs.build-and-push.outputs.image_tag }}"

          # Get current stack file
          STACK=$(curl -sf \
            -H "X-API-Key: ${{ secrets.PORTAINER_API_KEY }}" \
            "https://portainer.delvechio.tech/api/stacks/16/file")

          # Replace image tag in compose
          NEW_COMPOSE=$(echo "$STACK" | python3 -c "
          import json, sys, re
          data = json.load(sys.stdin)
          content = data['StackFileContent']
          content = re.sub(
            r'delvechiotech/chatwoot:[^\s\"]+',
            'delvechiotech/chatwoot:${TAG}',
            content
          )
          print(content)
          ")

          # Update stack via Portainer API
          curl -sf -X PUT \
            -H "X-API-Key: ${{ secrets.PORTAINER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://portainer.delvechio.tech/api/stacks/16?endpointId=1" \
            -d "{\"stackFileContent\": $(echo "$NEW_COMPOSE" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'), \"pullImage\": true}" \
            && echo "Portainer redeploy triggered for delvechiotech/chatwoot:${TAG}"
