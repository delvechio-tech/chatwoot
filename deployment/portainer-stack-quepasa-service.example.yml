version: "3.7"

# Quepasa stack example validated with this Chatwoot fork.
# Validated Quepasa version: v3.26.0427.1756
# Replace every CHANGE_ME value before deploying.
# Required external resources:
#   docker network create --driver overlay --attachable CHANGE_ME_NETWORK
#   docker volume create quepasa_volume

services:
  quepasa:
    # Pin the tested Quepasa v3.26.0427.1756 digest instead of using a floating latest tag.
    image: codeleaks/quepasa:latest@sha256:f156fc4fc774600be19cec4cc3d9c7c36a50d7968f5670e12cc82378e056382d
    volumes:
      - quepasa_volume:/opt/quepasa
    networks:
      - quepasa_network
    environment:
      - DOMAIN=CHANGE_ME_QUEPASA_DOMAIN
      - MASTERKEY=CHANGE_ME_QUEPASA_MASTER_KEY
      - WEBSERVER_PORT=31000
      - ACCOUNTSETUP=true
      - APP_TITLE=CHANGE_ME_APP_TITLE
      - TZ=America/Sao_Paulo

      # Database
      - DBDRIVER=postgres
      - DBHOST=CHANGE_ME_POSTGRES_HOST
      - DBDATABASE=CHANGE_ME_QUEPASA_DATABASE
      - DBPORT=5432
      - DBUSER=CHANGE_ME_POSTGRES_USER
      - DBPASSWORD=CHANGE_ME_POSTGRES_PASSWORD
      - DBSSLMODE=disable

      # WhatsApp
      - GROUPS=false
      - BROADCASTS=false
      - READRECEIPTS=forcedfalse
      - CALLS=false
      - READUPDATE=false

      # Quepasa
      - WEBSOCKETSSL=true
      - REMOVEDIGIT9=true
      - SIGNING_SECRET=CHANGE_ME_SIGNING_SECRET

      # Logging
      - LOGLEVEL=INFO
      - WHATSMEOW_LOGLEVEL=WARN
      - WHATSMEOW_DBLOGLEVEL=WARN
      - HTTPLOGS=false

      # General
      - SYNOPSISLENGTH=500
      - MIGRATIONS=/builder/migrations
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2"
          memory: 2048M
      labels:
        - traefik.enable=true
        - traefik.http.routers.quepasa.rule=Host(`CHANGE_ME_QUEPASA_DOMAIN`)
        - traefik.http.routers.quepasa.tls=true
        - traefik.http.routers.quepasa.entrypoints=websecure
        - traefik.http.routers.quepasa.tls.certresolver=letsencryptresolver
        - traefik.http.routers.quepasa.service=quepasa
        - traefik.http.services.quepasa.loadbalancer.server.port=31000
        - traefik.http.services.quepasa.loadbalancer.passHostHeader=true

volumes:
  quepasa_volume:
    external: true

networks:
  quepasa_network:
    name: CHANGE_ME_NETWORK
    external: true
